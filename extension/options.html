<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hub - Options</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0b0b12; color: #eaeaf0; margin: 0; padding: 28px; min-width: 340px; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    p { color: #a6a8b4; font-size: 13px; line-height: 1.5; margin: 0 0 16px; }
    label { display: block; font-size: 12px; color: #a6a8b4; margin-bottom: 6px; }
    input { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 9px; border: 1px solid #ffffff22; background: #14141c; color: #fff; font-size: 14px; }
    button { margin-top: 14px; padding: 10px 16px; border: 0; border-radius: 9px; background: #a3e635; color: #07070a; font-weight: 700; cursor: pointer; }
    .ok { color: #a3e635; font-size: 13px; margin-top: 10px; height: 16px; }
  </style>
</head>
<body>
  <h1>Lavzen Hub - New Tab</h1>
  <p>Enter the address of your self-hosted hub. Every new tab will open it, embedded full screen.</p>
  <label for="url">Hub URL</label>
  <input id="url" type="url" placeholder="https://hub.example.com" autocomplete="off">
  <button id="save">Save</button>
  <div class="ok" id="ok"></div>
  <script src="options.js"></script>
</body>
</html>
